
<style>
*{box-sizing:border-box;margin:0;padding:0}
#nb{display:flex;height:700px;background:#e8e4dc;font-family:var(--font-sans)}
#sidebar{width:72px;background:var(--color-background-primary);border-right:0.5px solid var(--color-border-tertiary);display:flex;flex-direction:column;align-items:center;padding:10px 0;gap:4px;flex-shrink:0;overflow-y:auto}
.sec-label{font-size:9px;color:var(--color-text-tertiary);letter-spacing:.5px;text-transform:uppercase;margin:8px 0 2px;text-align:center}
.tb{width:44px;height:44px;border-radius:8px;border:0.5px solid transparent;background:transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;transition:background .12s,border-color .12s;color:var(--color-text-secondary)}
.tb i{font-size:20px}
.tb span{font-size:8px;color:inherit}
.tb:hover{background:var(--color-background-secondary)}
.tb.on{background:#EEF4FF;border-color:#B5D4F4;color:#185FA5}
.cdot{width:24px;height:24px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:transform .1s,border-color .1s}
.cdot:hover{transform:scale(1.15)}
.cdot.on{border-color:var(--color-text-primary)}
#sz-wrap{display:flex;flex-direction:column;align-items:center;gap:3px;width:100%;padding:0 6px}
#sz-wrap span{font-size:10px;color:var(--color-text-secondary)}
#sz{writing-mode:vertical-lr;direction:rtl;width:4px;height:70px;accent-color:#378ADD;cursor:pointer}
#sheet-wrap{flex:1;overflow:hidden;display:flex;align-items:center;justify-content:center;padding:16px}
#sheet{position:relative;box-shadow:2px 3px 18px rgba(0,0,0,.18),0 0 0 1px rgba(0,0,0,.06)}
canvas{display:block}
#oc{position:absolute;top:0;left:0;cursor:crosshair}
#bot{position:absolute;bottom:0;left:72px;right:0;padding:4px 12px;font-size:11px;color:var(--color-text-tertiary);background:var(--color-background-primary);border-top:0.5px solid var(--color-border-tertiary);display:flex;gap:14px}
</style>

<h2 class="sr-only">Математическая тетрадь с боковой панелью инструментов</h2>

<div id="nb">
  <div id="sidebar">
    <div class="sec-label">Инструмент</div>
    <button class="tb on" id="b-pen" title="Ручка"><i class="ti ti-pencil"></i><span>ручка</span></button>
    <button class="tb" id="b-line" title="Линия"><i class="ti ti-line"></i><span>линия</span></button>
    <button class="tb" id="b-rect" title="Квадрат"><i class="ti ti-rectangle"></i><span>квадрат</span></button>
    <button class="tb" id="b-circle" title="Круг"><i class="ti ti-circle"></i><span>круг</span></button>
    <button class="tb" id="b-erase" title="Ластик"><i class="ti ti-eraser"></i><span>ластик</span></button>
    <div style="width:44px;height:0.5px;background:var(--color-border-tertiary);margin:6px 0"></div>
    <button class="tb" id="b-undo" title="Отмена"><i class="ti ti-arrow-back-up"></i><span>отмена</span></button>
    <button class="tb" id="b-clear" title="Очистить"><i class="ti ti-trash"></i><span>очистить</span></button>
    <button class="tb" id="b-save" title="Скачать"><i class="ti ti-download"></i><span>сохранить</span></button>
    <div style="width:44px;height:0.5px;background:var(--color-border-tertiary);margin:6px 0"></div>
    <div class="sec-label">Размер</div>
    <div id="sz-wrap"><input type="range" id="sz" min="1" max="24" value="2" step="1"><span id="szv">2</span></div>
    <div style="width:44px;height:0.5px;background:var(--color-border-tertiary);margin:6px 0"></div>
    <div class="sec-label">Цвет</div>
  </div>
  <div id="sheet-wrap">
    <div id="sheet">
      <canvas id="gc"></canvas>
      <canvas id="oc"></canvas>
    </div>
  </div>
</div>
<div id="bot"><span id="st-tool">Ручка</span><span id="st-pos">x:0 y:0</span><span>Shift — ровная фигура</span></div>

<script>
const COLORS=[
  '#1a1a1a','#1565C0','#C62828','#2E7D32','#6A1B9A',
  '#E65100','#00695C','#AD1457','#F9A825','#4E342E',
  '#546E7A','#558B2F','#0097A7','#880E4F','#BF360C'
];
const sidebar=document.getElementById('sidebar');
let curColor=COLORS[0];
COLORS.forEach(c=>{
  const d=document.createElement('div');
  d.className='cdot'+(c===curColor?' on':'');
  d.style.background=c;
  if(c==='#f5f5f5')d.style.outline='1px solid #ccc';
  d.title=c;
  d.addEventListener('click',()=>{
    document.querySelectorAll('.cdot').forEach(x=>x.classList.remove('on'));
    d.classList.add('on'); curColor=c;
  });
  sidebar.appendChild(d);
});

const CELL=18,COLS=32,ROWS=38;
const W=CELL*COLS, H=CELL*ROWS;
const SCALE=2;
const sheet=document.getElementById('sheet');
sheet.style.width=W+'px'; sheet.style.height=H+'px';

const gc=document.getElementById('gc'),oc=document.getElementById('oc');
[gc,oc].forEach(c=>{c.width=W*SCALE;c.height=H*SCALE;c.style.width=W+'px';c.style.height=H+'px';});
const gx=gc.getContext('2d'),ox=oc.getContext('2d');
gx.scale(SCALE,SCALE); ox.scale(SCALE,SCALE);

function drawGrid(){
  gx.fillStyle='#FFFEF5'; gx.fillRect(0,0,W,H);
  gx.strokeStyle='#B8CFE0'; gx.lineWidth=0.4;
  for(let x=0;x<=W;x+=CELL){gx.beginPath();gx.moveTo(x,0);gx.lineTo(x,H);gx.stroke();}
  for(let y=0;y<=H;y+=CELL){gx.beginPath();gx.moveTo(0,y);gx.lineTo(W,y);gx.stroke();}
  gx.strokeStyle='#8FAFC4'; gx.lineWidth=0.7;
  for(let x=0;x<=W;x+=CELL*5){gx.beginPath();gx.moveTo(x,0);gx.lineTo(x,H);gx.stroke();}
  for(let y=0;y<=H;y+=CELL*5){gx.beginPath();gx.moveTo(0,y);gx.lineTo(W,y);gx.stroke();}
  gx.strokeStyle='#EF9F97'; gx.lineWidth=0.8;
  gx.beginPath();gx.moveTo(CELL*3,0);gx.lineTo(CELL*3,H);gx.stroke();
}
drawGrid();

let undoStack=[], tool='pen', drawing=false, lx=0,ly=0, sx=0,sy=0, snap=null;
function saveUndo(){undoStack.push(gc.toDataURL());if(undoStack.length>30)undoStack.shift();}
saveUndo();

function undo(){
  if(!undoStack.length)return;
  const url=undoStack.pop();
  const img=new Image();
  img.onload=()=>{gx.clearRect(0,0,W,H);gx.drawImage(img,0,0,W,H);};
  img.src=url;
}

const sz=document.getElementById('sz'), szv=document.getElementById('szv');
sz.addEventListener('input',()=>szv.textContent=sz.value);

const toolBtns={pen:'b-pen',line:'b-line',rect:'b-rect',circle:'b-circle',erase:'b-erase'};
function setTool(t,label){
  tool=t;
  Object.values(toolBtns).forEach(id=>document.getElementById(id).classList.remove('on'));
  if(toolBtns[t])document.getElementById(toolBtns[t]).classList.add('on');
  document.getElementById('st-tool').textContent=label;
  oc.style.cursor=t==='erase'?'cell':'crosshair';
}
document.getElementById('b-pen').addEventListener('click',()=>setTool('pen','Ручка'));
document.getElementById('b-line').addEventListener('click',()=>setTool('line','Линия'));
document.getElementById('b-rect').addEventListener('click',()=>setTool('rect','Квадрат'));
document.getElementById('b-circle').addEventListener('click',()=>setTool('circle','Круг'));
document.getElementById('b-erase').addEventListener('click',()=>setTool('erase','Ластик'));
document.getElementById('b-undo').addEventListener('click',undo);
document.getElementById('b-clear').addEventListener('click',()=>{saveUndo();gx.clearRect(0,0,W,H);drawGrid();});
document.getElementById('b-save').addEventListener('click',()=>{
  const tmp=document.createElement('canvas');
  tmp.width=W*3;tmp.height=H*3;
  const tc=tmp.getContext('2d');tc.scale(3,3);
  tc.drawImage(gc,0,0,W*SCALE,H*SCALE,0,0,W,H);
  const a=document.createElement('a');a.download='тетрадь.png';a.href=tmp.toDataURL('image/png');a.click();
});

function gpos(e){
  const r=oc.getBoundingClientRect();
  const t=e.touches?e.touches[0]:e;
  return[t.clientX-r.left, t.clientY-r.top];
}

function hexRgba(hex,a){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return`rgba(${r},${g},${b},${a})`;
}

oc.addEventListener('mousedown',e=>{
  e.preventDefault();
  const[x,y]=gpos(e);
  drawing=true;[lx,ly]=[x,y];[sx,sy]=[x,y];
  if(['line','rect','circle'].includes(tool)){snap=gx.getImageData(0,0,W*SCALE,H*SCALE);}
  else saveUndo();
});
oc.addEventListener('mousemove',e=>{
  const[x,y]=gpos(e);
  document.getElementById('st-pos').textContent=`x:${Math.round(x)} y:${Math.round(y)}`;
  if(!drawing)return;
  const size=parseInt(sz.value);
  gx.lineCap='round';gx.lineJoin='round';
  if(tool==='pen'){
    gx.strokeStyle=curColor;gx.lineWidth=size;
    gx.beginPath();gx.moveTo(lx,ly);gx.lineTo(x,y);gx.stroke();
    [lx,ly]=[x,y];
  }else if(tool==='erase'){
    gx.globalCompositeOperation='destination-out';
    gx.beginPath();gx.arc(x,y,size*4,0,Math.PI*2);gx.fill();
    gx.globalCompositeOperation='source-over';
    gx.save();
    const r=gx.getImageData(Math.max(0,x-size*4-2),Math.max(0,y-size*4-2),size*8+4,size*8+4);
    gx.restore();
    [lx,ly]=[x,y];
  }else if(snap){
    gx.putImageData(snap,0,0);
    gx.strokeStyle=curColor;gx.lineWidth=size;gx.fillStyle='transparent';
    let dx=x-sx,dy=y-sy;
    if(e.shiftKey){const d=Math.max(Math.abs(dx),Math.abs(dy));dx=dx<0?-d:d;dy=dy<0?-d:d;}
    const ex=e.shiftKey?sx+dx:x,ey=e.shiftKey?sy+dy:y;
    if(tool==='line'){gx.beginPath();gx.moveTo(sx,sy);gx.lineTo(ex,ey);gx.stroke();}
    else if(tool==='rect'){gx.strokeRect(sx,sy,e.shiftKey?dx:x-sx,e.shiftKey?dy:y-sy);}
    else if(tool==='circle'){
      const rxx=Math.abs(e.shiftKey?dx:x-sx)/2,ryy=Math.abs(e.shiftKey?dy:y-sy)/2;
      const cx=sx+(e.shiftKey?dx:x-sx)/2,cy=sy+(e.shiftKey?dy:y-sy)/2;
      gx.beginPath();gx.ellipse(cx,cy,rxx,ryy,0,0,Math.PI*2);gx.stroke();
    }
  }
});
function onUp(){
  if(!drawing)return;
  if(['line','rect','circle'].includes(tool))saveUndo();
  drawing=false;snap=null;
}
oc.addEventListener('mouseup',onUp);
oc.addEventListener('mouseleave',onUp);
oc.addEventListener('touchstart',e=>{e.preventDefault();const ev=e.touches[0];oc.dispatchEvent(new MouseEvent('mousedown',{clientX:ev.clientX,clientY:ev.clientY}));},{passive:false});
oc.addEventListener('touchmove',e=>{e.preventDefault();const ev=e.touches[0];oc.dispatchEvent(new MouseEvent('mousemove',{clientX:ev.clientX,clientY:ev.clientY}));},{passive:false});
oc.addEventListener('touchend',()=>oc.dispatchEvent(new MouseEvent('mouseup')));
document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key==='z'){e.preventDefault();undo();}});
</script>
