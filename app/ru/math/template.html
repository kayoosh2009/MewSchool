<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Урок 000</title>
    <link href="../../../css/lesson_ru.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="content-wrapper">
            <div class="image-container">
                <img id="slide-image" src="" alt="Изображение урока">
            </div>
            <div class="text-container">
                <h2 id="slide-title"></h2>
                <p id="slide-text"></p>
            </div>
        </div>
        
        <div class="buttons">
            <button id="prev-btn" type="button">← Назад</button>
            <button id="next-btn" type="button">Далее →</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const slides = [
                {
                    image: "https://via.placeholder.com/500x400/c2c9b5/333333?text=Введение",
                    title: "Введение в треугольники",
                    text: "Треугольник - это геометрическая фигура, образованная тремя отрезками, которые соединяют три точки, не лежащие на одной прямой. Треугольник имеет три стороны, три угла и три вершины."
                },
                {
                    image: "https://via.placeholder.com/500x400/c2c9b5/333333?text=Виды+по+сторонам",
                    title: "Виды треугольников по сторонам",
                    text: "Равносторонний - все стороны равны. Равнобедренный - две стороны равны. Разносторонний - все стороны разной длины."
                },
                {
                    image: "https://via.placeholder.com/500x400/c2c9b5/333333?text=Виды+по+углам",
                    title: "Виды треугольников по углам",
                    text: "Остроугольный - все углы острые (< 90°). Прямоугольный - один угол прямой (= 90°). Тупоугольный - один угол тупой (> 90°)."
                },
                {
                    image: "https://via.placeholder.com/500x400/c2c9b5/333333?text=Свойства",
                    title: "Свойства треугольников",
                    text: "Сумма углов треугольника всегда равна 180°. Внешний угол треугольника равен сумме двух внутренних углов, не смежных с ним."
                },
                {
                    image: "https://via.placeholder.com/500x400/c2c9b5/333333?text=Площадь",
                    title: "Формулы площади",
                    text: "Площадь можно найти через основание и высоту: S = ½ × a × h. Или по формуле Герона, зная все три стороны."
                }
            ];

            let currentSlide = 0;

            const slideImage = document.getElementById('slide-image');
            const slideTitle = document.getElementById('slide-title');
            const slideText = document.getElementById('slide-text');
            const prevBtn = document.getElementById('prev-btn');
            const nextBtn = document.getElementById('next-btn');

            function updateSlide() {
                const slide = slides[currentSlide];
                
                slideImage.src = slide.image;
                slideTitle.textContent = slide.title;
                slideText.textContent = slide.text;
                
                prevBtn.disabled = (currentSlide === 0);
                
                if (currentSlide === slides.length - 1) {
                    nextBtn.textContent = "Закончить урок ✓";
                } else {
                    nextBtn.textContent = "Далее →";
                }
            }

            prevBtn.addEventListener('click', () => {
                if (currentSlide > 0) {
                    currentSlide--;
                    updateSlide();
                }
            });

            nextBtn.addEventListener('click', () => {
                if (currentSlide < slides.length - 1) {
                    currentSlide++;
                    updateSlide();
                } else {
                    finishLesson();
                }
            });

            function finishLesson() {
                window.location.href = "finish.html"; 
            }
            updateSlide();
        });
    </script>
</body>
</html>
