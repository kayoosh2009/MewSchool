<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MewSchool</title>
    <link rel="stylesheet" href="css/index_ru.css">
</head>
<body>

    <nav class="navbar">
        <div class="navbar-container">
            <a href="index.html" class="navbar-logo">
                <img src="img/logo_nav.png" alt="MewSchool Logo">
                <span class="navbar-title">MewSchool</span>
            </a>
            <div class="lang-selector">
                <button class="lang-btn" id="langBtn">
                    <img src="img/icons/lang.png" alt="Language" class="lang-main-icon">
                    <span class="lang-current">Русский</span>
                    <span class="lang-arrow">▼</span>
                </button>
                <div class="lang-dropdown" id="langDropdown">
                    <a href="index_ru.html" data-lang="ru" data-page="index_ru.html">
                        <img src="img/icons/ru.png" alt="Russia" class="lang-flag">
                        <span>Русский</span>
                    </a>
                    <a href="index.html" data-lang="he" data-page="index.html">
                        <img src="img/icons/he.png" alt="Israel" class="lang-flag">
                        <span>עברית</span>
                    </a>
                    <a href="index_en.html" data-lang="en" data-page="index_en.html">
                        <img src="img/icons/en.png" alt="USA" class="lang-flag">
                        <span>English</span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <section class="subjects-section">
        <div class="subjects-grid">
            <a href="#" class="subject-card" style="--card-color: #e74c3c;">
                <div class="subject-icon">
                    <img src="img/icons/math.png" alt="Математика">
                </div>
                <span class="subject-name">Математика</span>
            </a>
            <a href="#" class="subject-card" style="--card-color: #3498db;">
                <div class="subject-icon">
                    <img src="img/icons/english.png" alt="Английский">
                </div>
                <span class="subject-name">Английский</span>
            </a>
            <a href="#" class="subject-card" style="--card-color: #2ecc71;">
                <div class="subject-icon">
                    <img src="img/icons/chemistry.png" alt="Химия">
                </div>
                <span class="subject-name">Химия</span>
            </a>
            <a href="#" class="subject-card" style="--card-color: #9b59b6;">
                <div class="subject-icon">
                    <img src="img/icons/biology.png" alt="Биология">
                </div>
                <span class="subject-name">Биология</span>
            </a>
            <a href="#" class="subject-card" style="--card-color: #f39c12;">
                <div class="subject-icon">
                    <img src="img/icons/physics.png" alt="Физика">
                </div>
                <span class="subject-name">Физика</span>
            </a>
            <a href="#" class="subject-card" style="--card-color: #1abc9c;">
                <div class="subject-icon">
                    <img src="img/icons/programming.png" alt="Программирование">
                </div>
                <span class="subject-name">Программирование</span>
            </a>
        </div>
    </section>

    <footer class="footer">
        <div class="footer-container">
            <div class="footer-info">
                <p>Главный разработчик: <a href="#">@kayoosh_x</a></p>
                <p>Телефон: <a href="tel:+972535411783">+972 535411783</a></p>
                <p>Email: <a href="mailto:kayoosh2009@gmail.com">kayoosh2009@gmail.com</a></p>
            </div>
            
            <a href="#" class="donate-btn">
                <span class="donate-icon">💜</span>
                <span>Пожертвовать</span>
            </a>
        </div>
    </footer>

    <!-- Подключаем ваш JS файл -->
    <script src="js/index.js"></script>
</body>
</html>
